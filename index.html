<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>67 — Mavi Göz (kirik duzeltildi)</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#e6e6e9;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
  model-viewer{width:100vw;height:100vh;--poster-color:#e6e6e9}
  .badge{position:fixed;top:14px;left:16px;color:#222;font-size:15px;font-weight:600;letter-spacing:.3px}
  .hint{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#555;font-size:13px;pointer-events:none}
</style>
</head>
<body>
<div class="badge">67 — mavi goz · yakinlastir, goze bak</div>
<model-viewer
  src="model.glb"
  alt="67 head blue eye fixed"
  camera-controls
  touch-action="pan-y"
  interaction-prompt="none"
  shadow-intensity="0.7"
  exposure="1.15"
  min-field-of-view="3deg"
  bounds="tight"
  camera-orbit="0deg 85deg auto"
  camera-target="auto auto auto">
</model-viewer>
<div class="hint">Surukle: dondur &nbsp;·&nbsp; Tekerlek / iki parmak: yakinlastir (goze kadar gir)</div>
</body>
</html>
